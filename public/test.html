<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highcharts with Dropdown</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
</head>
<body>

<select id="seriesSelector">
    <option value="series1">Series 1</option>
    <option value="series2">Series 2</option>
    <option value="series3">Series 3</option>
</select>

<div id="container" style="width: 100%; height: 400px;"></div>

<script>
    // Initial data
    const seriesData = {
        series1: [1, 3, 2, 4],
        series2: [5, 3, 4, 2],
        series3: [2, 2, 3, 3]
    };

    // Create the initial chart
    const chart = Highcharts.chart('container', {
        title: {
            text: 'Highcharts Dropdown Example'
        },
        xAxis: {
            categories: ['Jan', 'Feb', 'Mar', 'Apr']
        },
        series: [{
            name: 'Series 1',
            data: seriesData.series1
        }]
    });

    // Function to update the chart based on the selected series
    function updateChart(selectedSeries) {
        chart.series[0].setData(seriesData[selectedSeries]);
        chart.series[0].name = selectedSeries.replace('series', 'Series ');
        chart.redraw();
    }

    // Event listener for dropdown changes
    document.getElementById('seriesSelector').addEventListener('change', function () {
        const selectedValue = this.value;
        updateChart(selectedValue);
    });
</script>

</body>
</html>
